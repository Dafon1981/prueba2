<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asistente de Emergencia IA</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.8"></script>
    <style>
        /* --- ESTILOS v4.2 - ENFOQUE MÓVIL Y NUEVO DISEÑO --- */
        :root {
            --primary-color: #005A9C; /* Azul del logo */
            --secondary-color: #007bff;
            --background-color: #f0f4f8;
            --surface-color: #ffffff;
            --text-primary: #212529;
            --text-secondary: #6c757d;
        }
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--background-color );
        }

        /* --- CONTENEDOR PRINCIPAL DE LA APP --- */
        .app-container {
            display: flex;
            flex-direction: column;
            height: 100vh; /* Ocupa toda la altura de la pantalla */
            width: 100%;
            max-width: 800px; /* Ancho máximo para una mejor vista en escritorio */
            margin: 0 auto;
            background-color: var(--surface-color);
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
        }

        /* --- CABECERA CON AVATAR Y LOGO --- */
        .chat-header {
            display: flex;
            flex-direction: column; /* Apilado verticalmente */
            align-items: center; /* Centrado */
            padding: 20px 16px;
            background-color: var(--primary-color);
            color: white;
            flex-shrink: 0; /* Evita que se encoja */
        }
        .avatar-container {
            width: 100px; /* Más grande */
            height: 100px;
            border-radius: 50%;
            overflow: hidden;
            margin-bottom: 15px; /* Espacio debajo del avatar */
            border: 3px solid rgba(255,255,255,0.8);
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        #presenter-avatar {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .header-info {
            text-align: center; /* Texto centrado */
        }
        .header-info h1 {
            margin: 0 0 5px 0;
            font-size: 1.5em;
        }
        .header-info p {
            margin: 0;
            font-size: 0.9em;
            opacity: 0.9;
        }
        .header-logo {
            width: 150px; /* Logo más grande */
            height: auto;
            margin-top: 20px; /* Espacio encima del logo */
        }

        /* --- VENTANA DE CHAT --- */
        #chat-window {
            flex-grow: 1;
            overflow-y: auto;
            padding: 20px;
        }
        .message { display: flex; margin-bottom: 15px; max-width: 85%; }
        .message-content { padding: 12px 18px; border-radius: 20px; line-height: 1.5; }
        .user-message { margin-left: auto; flex-direction: row-reverse; }
        .user-message .message-content { background-color: var(--secondary-color); color: white; border-bottom-right-radius: 5px; }
        .ia-message { margin-right: auto; }
        .ia-message .message-content { background-color: #e9e9eb; color: var(--text-primary); border-bottom-left-radius: 5px; }
        .error-message .message-content { background-color: #ffebee; color: #c62828; border: 1px solid #c62828; }
        
        /* --- ÁREA DE ENTRADA --- */
        #input-area {
            display: flex;
            padding: 10px 15px;
            border-top: 1px solid #ddd;
            align-items: center;
            background-color: #f8f9fa;
            flex-shrink: 0;
        }
        #user-input { flex-grow: 1; padding: 12px 18px; border: 1px solid #ccc; border-radius: 22px; font-size: 16px; resize: none; outline: none; }
        .action-button { background: var(--secondary-color); color: white; border: none; border-radius: 50%; width: 44px; height: 44px; margin-left: 10px; cursor: pointer; display: flex; justify-content: center; align-items: center; }
        
        /* --- ESTILOS DE MODALES Y TABLAS (SIN CAMBIOS) --- */
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; overflow: auto; background-color: rgba(0,0,0,0.5); }
        .modal-content { background-color: #fefefe; margin: 10% auto; padding: 20px; border: 1px solid #888; width: 80%; max-width: 500px; border-radius: 10px; }
        .close-btn { color: #aaa; float: right; font-size: 28px; font-weight: bold; cursor: pointer; }
        .tabla-resultados { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 14px; }
        .tabla-resultados th, .tabla-resultados td { padding: 10px; border: 1px solid #ddd; text-align: left; }
        .ver-mas-btn { background: none; border: none; color: var(--secondary-color); cursor: pointer; text-decoration: underline; }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- Cabecera Renovada -->
        <header class="chat-header">
            <div class="avatar-container">
                <img id="presenter-avatar" src="https://esiklpxyectbekxvajnw.supabase.co/storage/v1/object/public/videos/presentador.gif" alt="Asistente Virtual">
            </div>
            <div class="header-info">
                <h1>Manu Asistente IA</h1>
                <p>Hospital Cayetano Heredia</p>
            </div>
            <img src="https://www.hospitalcayetano.gob.pe/PortalWeb/assets/icon/logo-final.png" alt="Logo Hospital Cayetano Heredia" class="header-logo">
        </header>

        <!-- Ventana de Chat -->
        <main id="chat-window"></main>

        <!-- Área de Entrada (del código funcional v2.2 ) -->
        <footer id="input-area">
            <input type="text" id="user-input" placeholder="Escribe o presiona el micrófono...">
            <button id="mic-button" class="action-button" title="Grabar voz">🎤</button>
            <button id="send-button" class="action-button" title="Enviar">→</button>
        </footer>
    </div>

    <!-- Modales (del código funcional v2.2) -->
    <div id="detailsModal" class="modal"><div class="modal-content"><span class="close-btn" id="close-patient-modal">&times;</span><h3>Detalles Completos del Registro</h3><div id="modal-body"></div></div></div>
    <div id="doctorModal" class="modal"><div class="modal-content"><span class="close-btn" id="close-doctor-modal">&times;</span><div id="doctor-modal-body"></div></div></div>
    <script>
        // --- CÓDIGO JAVASCRIPT v2.2 (ESTABLE Y FUNCIONAL - SIN CAMBIOS) ---
        const supabaseUrl = 'https://esiklpxyectbekxvajnw.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVzaWtscHh5ZWN0YmVreHZham53Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjE2OTI1MjEsImV4cCI6MjA3NzI2ODUyMX0.mtQnqUrTmhmN1DQxOAUnGpizhYZobStHDH0cz_XfKGU';
        const supabase = window.supabase.createClient(supabaseUrl, supabaseKey );

        const chatWindow = document.getElementById('chat-window');
        const userInput = document.getElementById('user-input');
        const sendButton = document.getElementById('send-button');
        const micButton = document.getElementById('mic-button');
        const patientModal = document.getElementById('detailsModal');
        const patientModalBody = document.getElementById('modal-body');
        const closePatientBtn = document.getElementById('close-patient-modal');
        const doctorModal = document.getElementById('doctorModal');
        const doctorModalBody = document.getElementById('doctor-modal-body');
        const closeDoctorBtn = document.getElementById('close-doctor-modal');

        let allResults = [];
        let allDoctorResults = [];
        let conversationHistory = [];

        document.addEventListener('DOMContentLoaded', () => {
            addMessage("¡Hola! Soy Manu, tu asistente. ¿En qué puedo ayudarte hoy?", 'ia-message');
            userInput.focus();
        });

        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        let recognition;
        let speechTimeout;
        let isRecording = false;
        if (SpeechRecognition) {
            recognition = new SpeechRecognition();
            recognition.continuous = true; recognition.lang = 'es-ES'; recognition.interimResults = true;
            recognition.onresult = (event) => {
                clearTimeout(speechTimeout);
                let interimTranscript = ''; let finalTranscript = '';
                for (let i = event.resultIndex; i < event.results.length; ++i) {
                    if (event.results[i].isFinal) { finalTranscript += event.results[i][0].transcript; } 
                    else { interimTranscript += event.results[i][0].transcript; }
                }
                userInput.value = finalTranscript + interimTranscript;
                speechTimeout = setTimeout(() => { stopRecordingAndSend(); }, 2500);
            };
            recognition.onerror = (event) => { console.error('Error en el reconocimiento de voz:', event.error); addMessage(`Error de micrófono: ${event.error}`, 'error-message'); stopRecording(); };
        } else { micButton.style.display = 'none'; }
        function toggleRecording() { if (!recognition) return; isRecording ? stopRecording() : startRecording(); }
        function startRecording() { isRecording = true; micButton.classList.add('recording'); micButton.textContent = '...'; userInput.placeholder = 'Escuchando...'; recognition.start(); }
        function stopRecording() { if (!isRecording) return; isRecording = false; micButton.classList.remove('recording'); micButton.textContent = '🎤'; userInput.placeholder = 'Escribe o presiona el micrófono...'; recognition.stop(); clearTimeout(speechTimeout); }
        function stopRecordingAndSend() { if (!isRecording) return; stopRecording(); setTimeout(() => { if (userInput.value.trim()) { handleUserMessage(); } }, 100); }
        
        micButton.addEventListener('click', toggleRecording);
        sendButton.addEventListener('click', handleUserMessage);
        userInput.addEventListener('keypress', (e) => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleUserMessage(); } });
        closePatientBtn.onclick = () => patientModal.style.display = "none";
        closeDoctorBtn.onclick = () => doctorModal.style.display = "none";
        window.onclick = (event) => { 
            if (event.target == patientModal) { patientModal.style.display = "none"; }
            if (event.target == doctorModal) { doctorModal.style.display = "none"; }
        };

        function addMessage(content, type) {
            const messageDiv = document.createElement('div');
            messageDiv.classList.add('message');
            const contentDiv = document.createElement('div');
            contentDiv.classList.add('message-content');
            
            // Para mantener la compatibilidad con el código antiguo, aplicamos la clase aquí
            if (type === 'user-message') messageDiv.classList.add('user-message');
            if (type === 'ia-message') messageDiv.classList.add('ia-message');
            if (type === 'error-message') messageDiv.classList.add('error-message');

            contentDiv.innerHTML = content;
            messageDiv.appendChild(contentDiv);
            chatWindow.appendChild(messageDiv);
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }

        async function handleUserMessage() {
            const pregunta = userInput.value.trim();
            if (!pregunta) return;
            addMessage(pregunta, 'user-message');
            userInput.value = '';
            conversationHistory.push({ role: 'user', content: pregunta });
            addMessage('<span>Analizando...</span>', 'ia-message');

            try {
                const { data: iaResponse, error: planError } = await supabase.functions.invoke('chat-con-ia', {
                    body: { pregunta: pregunta, historial: conversationHistory.slice(-4) } 
                });
                if (planError) throw planError;
                chatWindow.removeChild(chatWindow.lastChild);

                if (iaResponse.tipo === 'charla') {
                    addMessage(iaResponse.respuesta, 'ia-message');
                    conversationHistory.push({ role: 'assistant', content: iaResponse.respuesta });
                } else if (iaResponse.tipo === 'consulta_db') {
                    const plan = iaResponse.plan;
                    let query = supabase.from(plan.tabla).select(plan.columnas);
                    if (plan.filtros) { plan.filtros.forEach(filtro => { query = query[filtro.operador](filtro.columna, filtro.valor); }); }
                    if (plan.limite) { query = query.limit(plan.limite); }

                    const { data: resultados, error: dbError } = await query;
                    if (dbError) throw dbError;

                    if (!resultados || resultados.length === 0) {
                        addMessage('No encontré resultados para tu consulta.', 'ia-message');
                    } else {
                        addMessage(`Encontré ${resultados.length} resultado(s).`, 'ia-message');
                        if (plan.tabla === 'doctores') {
                            mostrarResultadosDoctores(resultados);
                        } else {
                            mostrarResultadosPacientes(resultados);
                        }
                    }
                } else {
                    throw new Error("La respuesta de la IA no tiene el formato esperado.");
                }
            } catch (error) {
                console.error('Error en el proceso:', error);
                if (chatWindow.lastChild && chatWindow.lastChild.textContent.includes('Analizando')) {
                    chatWindow.removeChild(chatWindow.lastChild);
                }
                addMessage(`Lo siento, ocurrió un error: ${error.message}`, 'error-message');
            }
        }

        function mostrarResultadosPacientes(resultados) {
            allResults = resultados;
            const tablaHTML = `
                <p>Aquí tienes un resumen:</p>
                <table class="tabla-resultados">
                    <thead><tr><th>Paciente</th><th>Fecha Atención</th><th>Costo</th><th>Acción</th></tr></thead>
                    <tbody>
                        ${resultados.map((paciente, index) => `
                            <tr>
                                <td>${paciente.PACIENTE || 'N/A'}</td>
                                <td>${paciente.FecAte ? new Date(paciente.FecAte + 'T00:00:00').toLocaleDateString('es-ES') : 'N/A'}</td>
                                <td>S/ ${paciente.CostoTotal || '0.00'}</td>
                                <td><button class="ver-mas-btn" onclick="showPatientDetails(${index})">Ver más</button></td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>`;
            addMessage(tablaHTML, 'ia-message');
        }

        window.showPatientDetails = (index) => {
            const item = allResults[index];
            if (!item) return;
            let detailsHTML = '';
            for (const key in item) {
                if (key !== 'id') {
                    detailsHTML += `<div class="ficha-detalle"><strong>${key.replace(/_/g, ' ')}:</strong> ${item[key] || 'N/A'}</div>`;
                }
            }
            patientModalBody.innerHTML = detailsHTML;
            patientModal.style.display = "block";
        }
    </script>
</body>
</html>
