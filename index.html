<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asistente de Emergencia IA</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* --- ESTILOS GENERALES Y DE FONDO --- */
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100vh;
            overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #eef2f5;
        }
        .main-container {
            display: flex; justify-content: center; align-items: center;
            width: 100%; height: 100%;
            background: url('https://esiklpxyectbekxvajnw.supabase.co/storage/v1/object/public/fondos/recepcion.jpg' ) no-repeat center center;
            background-size: cover;
        }
        .app-container {
            width: 95%; max-width: 1200px; height: 90vh;
            background: rgba(255, 255, 255, 0.98); border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15); display: flex; overflow: hidden;
        }
        .presenter-panel {
            width: 35%; min-width: 300px; background-color: #1c2532;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            padding: 20px; box-sizing: border-box;
        }
        .presenter-video-container {
            width: 100%; padding-top: 100%; position: relative;
            border-radius: 50%; overflow: hidden; border: 5px solid #2a3b4e;
            box-shadow: 0 0 20px rgba(0, 123, 255, 0.3);
        }
        #presenter-video {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover;
        }
        .presenter-panel h1 { color: #ffffff; margin-top: 20px; font-size: 1.8em; text-align: center; }
        .presenter-panel p { color: #a9c1d9; text-align: center; font-size: 1em; }
        .chat-panel { flex-grow: 1; display: flex; flex-direction: column; }
        #chat-window { flex-grow: 1; overflow-y: auto; padding: 20px; }
        .message {
            margin-bottom: 15px; padding: 12px 18px; border-radius: 20px;
            max-width: 90%; line-height: 1.5; display: table;
        }
        .user-message { background-color: #007bff; color: white; margin-left: auto; border-bottom-right-radius: 5px; }
        .ia-message { background-color: #e9e9eb; color: #333; margin-right: auto; border-bottom-left-radius: 5px; }
        .error-message { background-color: #ffebee; color: #c62828; border: 1px solid #c62828; }
        .thinking-indicator { display: flex; align-items: center; gap: 5px; }
        .thinking-indicator .dot {
            width: 8px; height: 8px; background-color: #999; border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out both;
        }
        .thinking-indicator .dot:nth-child(1) { animation-delay: -0.32s; }
        .thinking-indicator .dot:nth-child(2) { animation-delay: -0.16s; }
        @keyframes bounce { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1.0); } }
        #input-area {
            display: flex; padding: 15px; border-top: 1px solid #ddd;
            align-items: center; background-color: #f8f9fa;
        }
        #user-input {
            flex-grow: 1; padding: 12px 18px; border: 1px solid #ccc;
            border-radius: 22px; font-size: 16px; resize: none; outline: none;
            transition: border-color 0.2s;
        }
        #user-input:focus { border-color: #007bff; }
        #action-button {
            background: #007bff; color: white; border: none; border-radius: 50%;
            width: 44px; height: 44px; margin-left: 10px; cursor: pointer;
            display: flex; justify-content: center; align-items: center;
            transition: background-color 0.2s, transform 0.2s;
        }
        #action-button:hover { background-color: #0056b3; }
        #action-button.recording { background-color: #dc3545; transform: scale(1.1); }
        #action-button svg { width: 20px; height: 20px; }
        .tabla-resultados { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 14px; }
        .tabla-resultados th, .tabla-resultados td { padding: 10px; border: 1px solid #ddd; text-align: left; }
        .ver-mas-btn { background: none; border: none; color: #007bff; cursor: pointer; text-decoration: underline; }
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; overflow: auto; background-color: rgba(0,0,0,0.6); justify-content: center; align-items: center; }
        .modal.active { display: flex; }
        .modal-content { background-color: #fefefe; padding: 25px; border: 1px solid #888; width: 90%; max-width: 550px; border-radius: 10px; position: relative; }
        .close-btn { position: absolute; top: 10px; right: 15px; color: #aaa; font-size: 28px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div class="main-container">
        <div class="app-container">
            <div class="presenter-panel">
                <div class="presenter-video-container">
                    <img id="presenter-video" src="https://esiklpxyectbekxvajnw.supabase.co/storage/v1/object/public/videos/presentador.gif" alt="Asistente Virtual">
                </div>
                <h1>Manu, tu Asistente IA</h1>
                <p>Estoy aquí para ayudarte a analizar los datos de emergencia de forma rápida y eficiente.</p>
            </div>
            <div class="chat-panel">
                <div id="chat-window"></div>
                <div id="input-area">
                    <input type="text" id="user-input" placeholder="Escribe o presiona el micrófono...">
                    <button id="action-button" title="Grabar voz">
                        <svg id="mic-icon" xmlns="http://www.w3.org/2000/svg" fill="currentColor" class="bi bi-mic-fill" viewBox="0 0 16 16"><path d="M5 3a3 3 0 0 1 6 0v5a3 3 0 0 1-6 0V3z"/><path d="M3.5 6.5A.5.5 0 0 1 4 7v1a4 4 0 0 0 8 0V7a.5.5 0 0 1 1 0v1a5 5 0 0 1-4.5 4.975V15h3a.5.5 0 0 1 0 1h-7a.5.5 0 0 1 0-1h3v-2.025A5 5 0 0 1 3 8V7a.5.5 0 0 1 .5-.5z"/></svg>
                        <svg id="send-icon" xmlns="http://www.w3.org/2000/svg" fill="currentColor" class="bi bi-arrow-up-short" viewBox="0 0 16 16" style="display: none;"><path fill-rule="evenodd" d="M8 12a.5.5 0 0 0 .5-.5V5.707l2.146 2.147a.5.5 0 0 0 .708-.708l-3-3a.5.5 0 0 0-.708 0l-3 3a.5.5 0 1 0 .708.708L7.5 5.707V11.5a.5.5 0 0 0 .5.5z"/></svg>
                    </button>
                </div>
            </div>
        </div>
    </div>
    <div id="detailsModal" class="modal"><div class="modal-content"><span class="close-btn" id="close-patient-modal">&times;</span><h3>Detalles Completos del Registro</h3><div id="modal-body"></div></div></div>
    <div id="doctorModal" class="modal"><div class="modal-content"><span class="close-btn" id="close-doctor-modal">&times;</span><div id="doctor-modal-body"></div></div></div>
    <script>
        // --- CÓDIGO JAVASCRIPT CORREGIDO (v3.3) ---
        const supabaseUrl = 'https://esiklpxyectbekxvajnw.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVzaWtscHh5ZWN0YmVreHZham53Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjE2OTI1MjEsImV4cCI6MjA3NzI2ODUyMX0.mtQnqUrTmhmN1DQxOAUnGpizhYZobStHDH0cz_XfKGU';
        const supabase = window.supabase.createClient(supabaseUrl, supabaseKey );

        // --- Selectores del DOM ---
        const chatWindow = document.getElementById('chat-window');
        const userInput = document.getElementById('user-input');
        const actionButton = document.getElementById('action-button');
        const micIcon = document.getElementById('mic-icon');
        const sendIcon = document.getElementById('send-icon');
        const patientModal = document.getElementById('detailsModal');
        const doctorModal = document.getElementById('doctorModal');
        
        let conversationHistory = [];

        // --- Función para añadir mensajes a la ventana ---
        function addMessage(content, type) {
            const messageDiv = document.createElement('div');
            messageDiv.classList.add('message', type);
            messageDiv.innerHTML = content;
            chatWindow.appendChild(messageDiv);
            chatWindow.scrollTop = chatWindow.scrollHeight;
            return messageDiv;
        }

        // --- Función principal para manejar la lógica del chat ---
        async function handleUserMessage() {
            const pregunta = userInput.value.trim();
            if (!pregunta) return;

            addMessage(pregunta, 'user-message');
            userInput.value = '';
            updateButtonState(); // Actualiza el botón a micrófono
            conversationHistory.push({ role: 'user', content: pregunta });
            
            const thinkingMessage = addMessage('<div class="thinking-indicator"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>', 'ia-message');

            try {
                const { data: iaResponse, error: functionError } = await supabase.functions.invoke('chat-con-ia', {
                    body: { pregunta, historial: conversationHistory.slice(-6) }
                });

                if (functionError) throw functionError;
                
                chatWindow.removeChild(thinkingMessage);

                if (iaResponse.tipo === 'charla') {
                    addMessage(iaResponse.respuesta, 'ia-message');
                    conversationHistory.push({ role: 'assistant', content: iaResponse.respuesta });
                } else if (iaResponse.tipo === 'consulta_db' && iaResponse.plan) {
                    const plan = iaResponse.plan;
                    let query = supabase.from(plan.tabla).select(plan.columnas || '*');
                    if (plan.filtros) {
                        plan.filtros.forEach(filtro => {
                            if (typeof query[filtro.operador] === 'function') {
                                query = query[filtro.operador](filtro.columna, filtro.valor);
                            }
                        });
                    }
                    if (plan.limite) { query = query.limit(plan.limite); }

                    const { data: resultados, error: dbError } = await query;
                    if (dbError) throw dbError;

                    let iaContent;
                    if (!resultados || resultados.length === 0) {
                        iaContent = 'No encontré resultados para tu consulta.';
                        addMessage(iaContent, 'ia-message');
                    } else {
                        iaContent = `Encontré ${resultados.length} resultado(s).`;
                        if (plan.tabla === 'doctores') {
                            addMessage(`Resultados de Doctores: <pre>${JSON.stringify(resultados, null, 2)}</pre>`, 'ia-message');
                        } else {
                            mostrarResultadosPacientes(resultados);
                        }
                    }
                    conversationHistory.push({ role: 'assistant', content: iaContent });
                } else {
                    throw new Error("La respuesta de la IA no tiene el formato esperado.");
                }
            } catch (error) {
                console.error('Error en el proceso:', error);
                if (thinkingMessage.parentNode) chatWindow.removeChild(thinkingMessage);
                addMessage(`Lo siento, ocurrió un error: ${error.message}`, 'error-message');
            }
        }
        
        // --- Funciones para mostrar resultados ---
        function mostrarResultadosPacientes(resultados) {
            window.allResults = resultados;
            const tablaHTML = `
                <p>Aquí tienes un resumen de los pacientes encontrados:</p>
                <table class="tabla-resultados">
                    <thead><tr><th>Paciente</th><th>Fecha Atención</th><th>Costo</th><th>Acción</th></tr></thead>
                    <tbody>
                        ${resultados.slice(0, 5).map((paciente, index) => `
                            <tr>
                                <td>${paciente.PACIENTE || 'N/A'}</td>
                                <td>${paciente.FecAte ? new Date(paciente.FecAte + 'T00:00:00').toLocaleDateString('es-ES') : 'N/A'}</td>
                                <td>S/ ${paciente.CostoTotal || '0.00'}</td>
                                <td><button class="ver-mas-btn" onclick="showPatientDetails(${index})">Ver más</button></td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
                ${resultados.length > 5 ? `<p>Mostrando 5 de ${resultados.length} resultados.</p>` : ''}`;
            addMessage(tablaHTML, 'ia-message');
        }

        window.showPatientDetails = (index) => {
            const item = window.allResults[index];
            if (!item) return;
            let detailsHTML = Object.entries(item).map(([key, value]) => 
                `<p><strong>${key.replace(/_/g, ' ')}:</strong> ${value || 'N/A'}</p>`
            ).join('');
            document.getElementById('modal-body').innerHTML = detailsHTML;
            patientModal.classList.add('active');
        };

        // --- Lógica de Reconocimiento de Voz ---
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        let recognition;
        if (SpeechRecognition) {
            recognition = new SpeechRecognition();
            recognition.continuous = false; recognition.lang = 'es-ES'; recognition.interimResults = false;
            recognition.onresult = (event) => {
                userInput.value = event.results[0][0].transcript;
                stopRecording();
                updateButtonState();
                setTimeout(handleUserMessage, 200);
            };
            recognition.onerror = (event) => {
                console.error('Error de reconocimiento de voz:', event.error);
                addMessage(`Error de micrófono: ${event.error}`, 'error-message');
                stopRecording();
            };
        } else {
            actionButton.style.display = 'none';
        }

        let isRecording = false;
        function startRecording() {
            if (isRecording || !recognition) return;
            isRecording = true;
            actionButton.classList.add('recording');
            recognition.start();
        }
        function stopRecording() {
            if (!isRecording || !recognition) return;
            isRecording = false;
            actionButton.classList.remove('recording');
            recognition.stop();
        }

        // --- LÓGICA CORREGIDA PARA EL BOTÓN DINÁMICO ---
        function updateButtonState() {
            if (userInput.value.trim() !== '') {
                micIcon.style.display = 'none';
                sendIcon.style.display = 'block';
                actionButton.setAttribute('title', 'Enviar mensaje');
            } else {
                micIcon.style.display = 'block';
                sendIcon.style.display = 'none';
                actionButton.setAttribute('title', 'Grabar voz');
            }
        }

        // --- Event Listeners CORREGIDOS ---
        actionButton.addEventListener('click', () => {
            if (userInput.value.trim() !== '') {
                handleUserMessage();
            } else {
                isRecording ? stopRecording() : startRecording();
            }
        });

        userInput.addEventListener('input', updateButtonState);
        userInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                handleUserMessage();
            }
        });
        
        // Cierre de modales
        document.getElementById('close-patient-modal').onclick = () => patientModal.classList.remove('active');
        document.getElementById('close-doctor-modal').onclick = () => doctorModal.classList.remove('active');
        window.onclick = (event) => {
            if (event.target == patientModal) patientModal.classList.remove('active');
            if (event.target == doctorModal) doctorModal.classList.remove('active');
        };

        // --- INICIALIZACIÓN ---
        addMessage("¡Hola! Soy Manu, tu asistente de análisis. ¿Qué información necesitas hoy?", 'ia-message');
        updateButtonState();

    </script>
</body>
</html>
