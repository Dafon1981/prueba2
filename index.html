<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asistente de Emergencia IA</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.8"></script>
    <style>
        /* --- ESTILOS v6.2 (ESTABLES - SIN CAMBIOS ) --- */
        :root { --primary-color: #005A9C; --secondary-color: #007bff; --header-bg-color: #001f3f; --header-text-color: #ffffff; --surface-color: rgba(255, 255, 255, 0.85); --text-primary: #212529; --ia-bubble-color: #e9e9eb; --error-color: #dc3545; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; overflow: hidden; }
        .app-container { position: relative; height: 100vh; width: 100%; }
        .background-image { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: url('https://esiklpxyectbekxvajnw.supabase.co/storage/v1/object/public/fondos/recepcion.jpg' ) no-repeat center center; background-size: cover; z-index: 1; }
        .chat-panel { position: relative; z-index: 2; height: 100%; width: 100%; max-width: 800px; margin: 0 auto; background-color: var(--surface-color); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); display: flex; flex-direction: column; box-shadow: 0 0 30px rgba(0,0,0,0.1); }
        .chat-header { display: flex; align-items: center; padding: 15px 20px; background-color: var(--header-bg-color); border-bottom: 1px solid rgba(0,0,0,0.1); flex-shrink: 0; }
        .header-logo { width: 40px; height: 40px; margin-right: 15px; }
        .header-info h1 { font-size: 1.2em; margin: 0; color: var(--header-text-color); }
        .header-info p { font-size: 0.8em; margin: 0; color: var(--header-text-color); opacity: 0.8; }
        .avatar-container { position: absolute; top: 20px; right: 20px; width: 120px; height: 150px; border-radius: 15px; overflow: hidden; border: 3px solid rgba(255, 255, 255, 0.7); box-shadow: 0 4px 15px rgba(0,0,0,0.2); z-index: 10; opacity: 0.9; }
        #presenter-avatar { width: 100%; height: 100%; object-fit: cover; }
        #chat-window { flex-grow: 1; overflow-y: auto; padding: 20px; }
        .message { display: flex; margin-bottom: 15px; max-width: 85%; margin-right: auto; }
        .message-content { padding: 12px 18px; border-radius: 20px; line-height: 1.5; }
        .user-message .message-content { background-color: var(--secondary-color); color: white; border-bottom-left-radius: 5px; }
        .ia-message .message-content { background-color: var(--ia-bubble-color); color: var(--text-primary); border-bottom-left-radius: 5px; }
        .error-message .message-content { background-color: var(--error-color); color: white; border-bottom-left-radius: 5px; }
        #input-area { display: flex; padding: 15px; border-top: 1px solid rgba(0,0,0,0.1); align-items: center; background-color: rgba(248, 249, 250, 0.9); flex-shrink: 0; }
        #user-input { flex-grow: 1; padding: 15px 20px; border: 1px solid #ccc; border-radius: 30px; font-size: 16px; resize: none; outline: none; }
        #action-button { background-color: transparent; border: none; padding: 0; margin-left: 15px; cursor: pointer; width: 80px; height: 80px; flex-shrink: 0; }
        #action-button.recording img { animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.15); } 100% { transform: scale(1); } }
        #action-button img { width: 100%; height: 100%; transition: transform 0.2s; }
        #action-button:hover img { transform: scale(1.1); }
        .doctor-card { background: #f8f9fa; border: 1px solid #dee2e6; border-radius: 8px; padding: 15px; margin-top: 10px; }
        .doctor-card h4 { margin: 0 0 10px 0; font-size: 1.1em; }
        .doctor-card p { margin: 0 0 10px 0; font-size: 0.9em; }
        .ver-mas-btn { background: none; border: none; color: var(--secondary-color); cursor: pointer; text-decoration: underline; padding: 0; }
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; overflow: auto; background-color: rgba(0,0,0,0.6); justify-content: center; align-items: center; }
        .modal.active { display: flex; }
        .modal-content { background-color: #fefefe; padding: 25px; border: 1px solid #888; width: 90%; max-width: 550px; border-radius: 10px; position: relative; }
        .close-btn { position: absolute; top: 10px; right: 15px; color: #aaa; font-size: 28px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="background-image"></div>
        <div class="chat-panel">
            <header class="chat-header">
                <img src="https://www.hospitalcayetano.gob.pe/PortalWeb/assets/icon/logo-final.png" alt="Logo Hospital" class="header-logo">
                <div class="header-info">
                    <h1>Recepción de Emergencia Chat</h1>
                    <p>Asistente de Información</p>
                </div>
            </header>
            <div class="avatar-container">
                <img id="presenter-avatar" src="" alt="Asistente Virtual">
            </div>
            <main id="chat-window"></main>
            <footer id="input-area">
                <input type="text" id="user-input" placeholder="Escribe o presiona el micrófono...">
                <button id="action-button">
                    <img id="action-button-icon" src="" alt="Acción">
                </button>
            </footer>
        </div>
    </div>
    <div id="detailsModal" class="modal"><div class="modal-content"><span class="close-btn" id="closePatientModal">×</span><div id="detailsModalContent"></div></div></div>
    <div id="doctorModal" class="modal"><div class="modal-content"><span class="close-btn" id="closeDoctorModal">×</span><div id="doctorModalContent"></div></div></div>
    <script>
        // --- CÓDIGO JAVASCRIPT v7.0 (LÓGICA DE CLIENTE RESTAURADA Y ROBUSTA) ---
        const supabaseUrl = 'https://esiklpxyectbekxvajnw.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVzaWtscHh5ZWN0YmVreHZham53Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjE2OTI1MjEsImV4cCI6MjA3NzI2ODUyMX0.mtQnqUrTmhmN1DQxOAUnGpizhYZobStHDH0cz_XfKGU';
        const supabase = window.supabase.createClient(supabaseUrl, supabaseKey );

        const presenterAvatar = document.getElementById('presenter-avatar');
        const chatWindow = document.getElementById('chat-window');
        const userInput = document.getElementById('user-input');
        const actionButton = document.getElementById('action-button');
        const actionButtonIcon = document.getElementById('action-button-icon');
        const detailsModal = document.getElementById('detailsModal');
        const detailsModalContent = document.getElementById('detailsModalContent');
        const doctorModal = document.getElementById('doctorModal');
        const doctorModalContent = document.getElementById('doctorModalContent');
        
        let conversationHistory = [];
        let allPatientResults = [];
        let allDoctorResults = [];

        const URL_BOTON_ROJO = 'https://raw.githubusercontent.com/Dafon1981/prueba2/main/boton_rojo.png';
        const URL_BOTON_VERDE = 'https://raw.githubusercontent.com/Dafon1981/prueba2/main/boton_verde.png';
        const gifs = { saludo: ['01_saludo.gif'], si: ['si_02.gif', 'si_03.gif', 'si_04.gif'], no: ['no_01.gif', 'no_02.gif', 'no_03.gif'], conversacion: ['con_01.gif', 'con_02.gif', 'con_03.gif'] };
        const NEUTRO_URL = 'https://raw.githubusercontent.com/Dafon1981/prueba2/main/neutro.jpg';
        
        function setAvatar(tipo ) { const gifList = gifs[tipo] || gifs.conversacion; const randomGif = gifList[Math.floor(Math.random() * gifList.length)]; const baseUrl = `https://raw.githubusercontent.com/Dafon1981/prueba2/main/${randomGif}`; presenterAvatar.src = `${baseUrl}?t=${new Date( ).getTime()}`; setTimeout(() => { presenterAvatar.src = NEUTRO_URL; }, 2500); }
        function updateActionButton() { actionButtonIcon.src = (userInput.value.trim() === '') ? URL_BOTON_ROJO : URL_BOTON_VERDE; actionButton.title = (userInput.value.trim() === '') ? "Grabar voz" : "Enviar mensaje"; }

        document.addEventListener('DOMContentLoaded', () => { presenterAvatar.src = NEUTRO_URL; setAvatar('saludo'); addMessage("Soy asistente de recepcion de emergencia ¿En qué puedo ayudarte hoy?", 'ia-message'); userInput.focus(); updateActionButton(); });

        function predecirUbicacionFUA(fechaRegistro) { if (!fechaRegistro) return "No se pudo determinar la fecha del registro."; const fechaReg = new Date(fechaRegistro); const hoy = new Date(); const diffTime = Math.abs(hoy - fechaReg); const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24)); if (diffDays <= 7) return "Probablemente en **Recepción (Cajas)** o **Asignación**."; else if (diffDays <= 21) return "Posiblemente en **Auditoría**, **Digitación** o **Archivos de digitación**."; else return "Muy probable que ya se encuentre en **Archivo Central**."; }

        async function handleUserMessage() {
            const pregunta = userInput.value.trim();
            if (!pregunta) return;
            addMessage(pregunta, 'user-message');
            userInput.value = '';
            updateActionButton();
            conversationHistory.push({ role: 'user', content: pregunta });
            const thinkingMessage = addMessage('<span>Analizando...</span>', 'ia-message');

            try {
                // --- ¡LLAMADA A LA FUNCIÓN CORREGIDA! ---
                const { data: iaResponse, error: functionError } = await supabase.functions.invoke('chat-con-ia', { 
                    body: { pregunta: pregunta, historial: conversationHistory.slice(-6) } 
                });

                if (functionError) throw functionError;
                chatWindow.removeChild(thinkingMessage);

                if (iaResponse.tipo === 'charla') {
                    setAvatar('conversacion');
                    addMessage(iaResponse.respuesta, 'ia-message');
                    conversationHistory.push({ role: 'assistant', content: iaResponse.respuesta });
                } 
                else if (iaResponse.tipo === 'prediccion_fua') {
                    const { data: resultados, error: dbError } = await supabase.from('registros').select('PACIENTE, FechaRegistro').ilike(iaResponse.plan.filtros[0].columna, iaResponse.plan.filtros[0].valor);
                    if (dbError) throw dbError;
                    if (!resultados || resultados.length === 0) { setAvatar('no'); addMessage('No encontré la FUA que mencionas.', 'ia-message'); }
                    else {
                        setAvatar('si');
                        const registro = resultados[0];
                        const prediccion = predecirUbicacionFUA(registro.FechaRegistro);
                        addMessage(`Para el paciente <strong>${registro.PACIENTE}</strong>, mi predicción es: ${prediccion}`, 'ia-message');
                    }
                }
                else if (iaResponse.tipo === 'consulta_db') {
                    const plan = iaResponse.plan;
                    let query = supabase.from(plan.tabla);

                    // --- ¡LÓGICA DE CONSTRUCCIÓN DE CONSULTA RESTAURADA Y CORREGIDA! ---
                    if (plan.filtros && plan.filtros.length > 0) {
                        plan.filtros.forEach(filtro => {
                            query = query[filtro.operador](filtro.columna, filtro.valor);
                        });
                    }

                    if (plan.accion === 'count') {
                        const { count, error: countError } = await query.select('*', { count: 'exact', head: true });
                        if (countError) throw countError;
                        setAvatar('si');
                        addMessage(`Se encontraron <strong>${count}</strong> registros que coinciden.`, 'ia-message');
                    } else {
                        const { data: resultados, error: dbError } = await query.select(plan.columnas || '*');
                        if (dbError) throw dbError;
                        if (!resultados || resultados.length === 0) { setAvatar('no'); addMessage('No encontré resultados.', 'ia-message'); }
                        else {
                            setAvatar('si');
                            addMessage(`Encontré ${resultados.length} resultado(s).`, 'ia-message');
                            if (plan.tabla === 'doctores') {
                                mostrarResultadosDoctores(resultados);
                            } else {
                                mostrarResultadosPacientes(resultados);
                            }
                        }
                    }
                } else { throw new Error("Respuesta inesperada de la IA."); }
            } catch (error) { setAvatar('no'); console.error('Error:', error); if (thinkingMessage.parentNode) chatWindow.removeChild(thinkingMessage); addMessage(`Error: ${error.message}`, 'error-message'); }
        }

        // --- RESTO DE FUNCIONES (SIN CAMBIOS) ---
        actionButton.addEventListener('click', () => { if (userInput.value.trim() !== '') handleUserMessage(); else console.log("Iniciar grabación de voz..."); });
        userInput.addEventListener('input', updateActionButton);
        userInput.addEventListener('keypress', (e) => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleUserMessage(); } });
        function addMessage(content, type) { const messageDiv = document.createElement('div'); messageDiv.classList.add('message'); const contentDiv = document.createElement('div'); contentDiv.classList.add('message-content'); if (type === 'user-message') messageDiv.classList.add('user-message'); if (type === 'ia-message') messageDiv.classList.add('ia-message'); if (type === 'error-message') messageDiv.classList.add('error-message'); contentDiv.innerHTML = content; messageDiv.appendChild(contentDiv); chatWindow.appendChild(messageDiv); chatWindow.scrollTop = chatWindow.scrollHeight; return messageDiv; }
        function mostrarResultadosPacientes(resultados) { allPatientResults = resultados; const tablaHTML = `<p>Resumen:</p><table class="tabla-resultados"><thead><tr><th>Paciente</th><th>Fecha</th><th>Costo</th><th>Acción</th></tr></thead><tbody>${resultados.slice(0,5).map((p, i) => `<tr><td>${p.PACIENTE||'N/A'}</td><td>${p.FecAte?new Date(p.FecAte+'T00:00:00').toLocaleDateString('es-ES'):'N/A'}</td><td>S/ ${p.CostoTotal||'0.00'}</td><td><button class="ver-mas-btn" onclick="showPatientDetails(${i})">Ver más</button></td></tr>`).join('')}</tbody></table>`; addMessage(tablaHTML, 'ia-message'); }
        function mostrarResultadosDoctores(resultados) { allDoctorResults = resultados; const cardsHTML = resultados.map((doc, index) => `<div class="doctor-card"><h4>${doc.nombre||'Sin nombre'}</h4><p><strong>Especialidad:</strong> ${doc.especialidad||'N/A'} | <strong>RNE:</strong> ${doc.rne||'N/A'}</p><button class="ver-mas-btn" onclick="showDoctorDetails(${index})">Ver Ficha Completa</button></div>`).join(''); addMessage(cardsHTML, 'ia-message'); }
        window.showPatientDetails = (index) => { const item = allPatientResults[index]; if (!item) return; let detailsHTML = '<h3>Detalles del Paciente</h3>'; for (const key in item) { if (key !== 'id') { detailsHTML += `<p><strong>${key.replace(/_/g, ' ')}:</strong> ${item[key] || 'N/A'}</p>`; } } detailsModalContent.innerHTML = detailsHTML; detailsModal.classList.add('active'); };
        window.showDoctorDetails = (index) => { const doc = allDoctorResults[index]; if (!doc) return; let detailsHTML = '<h3>Ficha del Doctor</h3>'; for (const key in doc) { if (key !== 'id' && key !== 'foto' && key !== 'firma') { detailsHTML += `<p><strong>${key.replace(/_/g, ' ')}:</strong> ${doc[key] || 'N/A'}</p>`; } } doctorModalContent.innerHTML = detailsHTML; doctorModal.classList.add('active'); };
        document.getElementById('closePatientModal').onclick = () => detailsModal.classList.remove('active');
        document.getElementById('closeDoctorModal').onclick = () => doctorModal.classList.remove('active');
        window.onclick = (event) => { if (event.target == detailsModal) { detailsModal.classList.remove('active'); } if (event.target == doctorModal) { doctorModal.classList.remove('active'); } };
    </script>
</body>
</html>
