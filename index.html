<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asistente de Emergencia IA</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --primary-color: #005A9C; /* Azul del logo */
            --secondary-color: #007bff;
            --background-color: #f0f4f8;
            --surface-color: #ffffff;
            --text-primary: #212529;
            --text-secondary: #6c757d;
        }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: var(--background-color ); }
        .app-container { display: flex; flex-direction: column; height: 100vh; width: 100%; max-width: 800px; margin: 0 auto; background-color: var(--surface-color); box-shadow: 0 0 20px rgba(0,0,0,0.1); }
        .chat-header { display: flex; align-items: center; padding: 12px 16px; background-color: var(--primary-color); color: white; flex-shrink: 0; }
        .avatar-container { width: 50px; height: 50px; border-radius: 50%; overflow: hidden; margin-right: 15px; border: 2px solid rgba(255,255,255,0.8); }
        #presenter-avatar { width: 100%; height: 100%; object-fit: cover; }
        .header-info h1 { margin: 0; font-size: 1.2em; }
        .header-info p { margin: 0; font-size: 0.8em; opacity: 0.8; }
        .header-logo { margin-left: auto; width: 40px; height: 40px; }
        #chat-window { flex-grow: 1; overflow-y: auto; padding: 20px; }
        .message { display: flex; margin-bottom: 15px; max-width: 85%; }
        .message-content { padding: 12px 18px; border-radius: 20px; line-height: 1.5; }
        .user-message { margin-left: auto; flex-direction: row-reverse; }
        .user-message .message-content { background-color: var(--secondary-color); color: white; border-bottom-right-radius: 5px; }
        .ia-message { margin-right: auto; }
        .ia-message .message-content { background-color: #e9e9eb; color: var(--text-primary); border-bottom-left-radius: 5px; }
        .error-message .message-content { background-color: #ffebee; color: #c62828; border: 1px solid #c62828; }
        .thinking-indicator { display: flex; align-items: center; gap: 5px; }
        .thinking-indicator .dot { width: 8px; height: 8px; background-color: #999; border-radius: 50%; animation: bounce 1.4s infinite ease-in-out both; }
        .thinking-indicator .dot:nth-child(1) { animation-delay: -0.32s; }
        .thinking-indicator .dot:nth-child(2) { animation-delay: -0.16s; }
        @keyframes bounce { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1.0); } }
        #input-form { display: flex; padding: 10px 15px; border-top: 1px solid #ddd; align-items: center; background-color: #f8f9fa; flex-shrink: 0; }
        #user-input { flex-grow: 1; padding: 12px 18px; border: 1px solid #ccc; border-radius: 22px; font-size: 16px; resize: none; outline: none; }
        #action-button { background: var(--secondary-color); color: white; border: none; border-radius: 50%; width: 44px; height: 44px; margin-left: 10px; cursor: pointer; display: flex; justify-content: center; align-items: center; transition: transform 0.2s; }
        #action-button:disabled { background-color: #a9c1d9; cursor: not-allowed; }
        #action-button svg { width: 20px; height: 20px; }
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.6); justify-content: center; align-items: center; }
        .modal.active { display: flex; }
        .modal-content { background-color: #fefefe; padding: 25px; width: 90%; max-width: 550px; border-radius: 10px; position: relative; }
        .close-btn { position: absolute; top: 10px; right: 15px; color: #aaa; font-size: 28px; font-weight: bold; cursor: pointer; }
        .tabla-resultados { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 14px; }
        .tabla-resultados th, .tabla-resultados td { padding: 10px; border: 1px solid #ddd; text-align: left; }
        .ver-mas-btn { background: none; border: none; color: var(--secondary-color); cursor: pointer; text-decoration: underline; }
    </style>
</head>
<body>
    <div class="app-container">
        <header class="chat-header">
            <div class="avatar-container">
                <img id="presenter-avatar" src="https://esiklpxyectbekxvajnw.supabase.co/storage/v1/object/public/videos/presentador.gif" alt="Asistente Virtual">
            </div>
            <div class="header-info">
                <h1>Manu Asistente IA</h1>
                <p>Analizando datos de emergencia</p>
            </div>
            <img src="https://www.hospitalcayetano.gob.pe/PortalWeb/assets/icon/logo-final.png" alt="Logo Hospital" class="header-logo">
        </header>
        <main id="chat-window"></main>
        <footer id="input-form">
            <input type="text" id="user-input" placeholder="Escribe tu consulta..." autocomplete="off">
            <button type="submit" id="action-button" title="Enviar mensaje">
                <svg xmlns="http://www.w3.org/2000/svg" fill="currentColor" class="bi bi-arrow-up" viewBox="0 0 16 16">
                    <path fill-rule="evenodd" d="M8 15a.5.5 0 0 0 .5-.5V2.707l3.146 3.147a.5.5 0 0 0 .708-.708l-4-4a.5.5 0 0 0-.708 0l-4 4a.5.5 0 1 0 .708.708L7.5 2.707V14.5a.5.5 0 0 0 .5.5z"/>
                </svg>
            </button>
        </footer>
    </div>
    <div id="detailsModal" class="modal"><div class="modal-content"><span class="close-btn" id="close-patient-modal">&times;</span><h3>Detalles Completos del Registro</h3><div id="modal-body"></div></div></div>
    <div id="doctorModal" class="modal"><div class="modal-content"><span class="close-btn" id="close-doctor-modal">&times;</span><div id="doctor-modal-body"></div></div></div>
    <script>
        // --- CÓDIGO JAVASCRIPT v4.1 (FUSIÓN FUNCIONAL) ---
        const supabaseUrl = 'https://esiklpxyectbekxvajnw.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVzaWtscHh5ZWN0YmVreHZham53Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjE2OTI1MjEsImV4cCI6MjA3NzI2ODUyMX0.mtQnqUrTmhmN1DQxOAUnGpizhYZobStHDH0cz_XfKGU';
        const supabase = window.supabase.createClient(supabaseUrl, supabaseKey );

        const chatWindow = document.getElementById('chat-window');
        const inputForm = document.getElementById('input-form');
        const userInput = document.getElementById('user-input');
        const actionButton = document.getElementById('action-button');
        const patientModal = document.getElementById('detailsModal');
        const doctorModal = document.getElementById('doctorModal');
        
        let conversationHistory = [];

        function addMessage(content, type) {
            const messageDiv = document.createElement('div');
            messageDiv.classList.add('message', type);
            const contentDiv = document.createElement('div');
            contentDiv.classList.add('message-content');
            contentDiv.innerHTML = content;
            messageDiv.appendChild(contentDiv);
            chatWindow.appendChild(messageDiv);
            chatWindow.scrollTop = chatWindow.scrollHeight;
            return messageDiv;
        }

        async function handleUserMessage() {
            const pregunta = userInput.value.trim();
            if (!pregunta) return;

            addMessage(pregunta, 'user-message');
            userInput.value = '';
            conversationHistory.push({ role: 'user', content: pregunta });
            
            const thinkingMessage = addMessage('<div class="thinking-indicator"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>', 'ia-message');

            try {
                const { data: iaResponse, error: planError } = await supabase.functions.invoke('chat-con-ia', {
                    body: { pregunta: pregunta, historial: conversationHistory.slice(-4) } 
                });
                if (planError) throw planError;
                
                chatWindow.removeChild(thinkingMessage);

                if (iaResponse.tipo === 'charla') {
                    addMessage(iaResponse.respuesta, 'ia-message');
                    conversationHistory.push({ role: 'assistant', content: iaResponse.respuesta });
                } else if (iaResponse.tipo === 'consulta_db') {
                    const plan = iaResponse.plan;
                    let query = supabase.from(plan.tabla).select(plan.columnas);
                    if (plan.filtros) {
                        plan.filtros.forEach(filtro => {
                            if (typeof query[filtro.operador] === 'function') {
                                query = query[filtro.operador](filtro.columna, filtro.valor);
                            }
                        });
                    }
                    if (plan.limite) { query = query.limit(plan.limite); }

                    const { data: resultados, error: dbError } = await query;
                    if (dbError) throw dbError;

                    if (!resultados || resultados.length === 0) {
                        addMessage('No encontré resultados para tu consulta.', 'ia-message');
                    } else {
                        addMessage(`Encontré ${resultados.length} resultado(s).`, 'ia-message');
                        if (plan.tabla === 'doctores') {
                            // Aquí iría la lógica para mostrar doctores si la tuvieras
                            addMessage(`<pre>${JSON.stringify(resultados, null, 2)}</pre>`, 'ia-message');
                        } else {
                            mostrarResultadosPacientes(resultados);
                        }
                    }
                } else {
                    throw new Error("La respuesta de la IA no tiene el formato esperado.");
                }
            } catch (error) {
                console.error('Error en el proceso:', error);
                if (thinkingMessage.parentNode) chatWindow.removeChild(thinkingMessage);
                addMessage(`Lo siento, ocurrió un error: ${error.message}`, 'error-message');
            }
        }
        
        function mostrarResultadosPacientes(resultados) {
            window.allResults = resultados;
            const tablaHTML = `<div class="message-content">
                <p>Aquí tienes un resumen:</p>
                <table class="tabla-resultados">
                    <thead><tr><th>Paciente</th><th>Fecha Atención</th><th>Costo</th><th>Acción</th></tr></thead>
                    <tbody>
                        ${resultados.slice(0, 5).map((paciente, index) => `
                            <tr>
                                <td>${paciente.PACIENTE || 'N/A'}</td>
                                <td>${paciente.FecAte ? new Date(paciente.FecAte + 'T00:00:00').toLocaleDateString('es-ES') : 'N/A'}</td>
                                <td>S/ ${paciente.CostoTotal || '0.00'}</td>
                                <td><button class="ver-mas-btn" onclick="showPatientDetails(${index})">Ver más</button></td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
                ${resultados.length > 5 ? `<p>Mostrando 5 de ${resultados.length} resultados.</p>` : ''}</div>`;
            addMessage(tablaHTML, 'ia-message');
        }

        window.showPatientDetails = (index) => {
            const item = window.allResults[index];
            if (!item) return;
            let detailsHTML = Object.entries(item).map(([key, value]) => 
                `<p><strong>${key.replace(/_/g, ' ')}:</strong> ${value || 'N/A'}</p>`
            ).join('');
            document.getElementById('modal-body').innerHTML = detailsHTML;
            patientModal.classList.add('active');
        };

        // --- LÓGICA DE EVENTOS A PRUEBA DE FALLOS ---
        inputForm.addEventListener('submit', (e) => {
            e.preventDefault();
            handleUserMessage();
        });
        
        // Cierre de modales
        document.getElementById('close-patient-modal').onclick = () => patientModal.classList.remove('active');
        document.getElementById('close-doctor-modal').onclick = () => doctorModal.classList.remove('active');
        window.onclick = (event) => {
            if (event.target == patientModal) patientModal.classList.remove('active');
            if (event.target == doctorModal) doctorModal.classList.remove('active');
        };

        // --- INICIALIZACIÓN ---
        addMessage("¡Hola! Soy Manu, tu asistente de análisis. ¿Qué información necesitas hoy?", 'ia-message');
        userInput.focus();

    </script>
</body>
</html>
