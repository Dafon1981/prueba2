<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recepción de Emergencia con Chat IA v2.3 (Sin Login)</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.8"></script>
    <style>
        /* --- Estilos del código v2.2 Estable (SIN CAMBIOS ) --- */
        body, html { margin: 0; padding: 0; width: 100%; height: 100vh; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background: #f0f2f5; }
        .main-container { display: flex; justify-content: center; align-items: center; width: 100%; height: 100%; background: url('https://esiklpxyectbekxvajnw.supabase.co/storage/v1/object/public/fondos/recepcion.jpg'  ) no-repeat center center fixed; background-size: cover; }
        .chat-container { width: 90%; max-width: 800px; height: 90vh; background: rgba(255, 255, 255, 0.95); border-radius: 12px; box-shadow: 0 8px 24px rgba(0,0,0,0.1); display: flex; flex-direction: column; }
        #chat-window { flex-grow: 1; overflow-y: auto; padding: 20px; }
        .message { margin-bottom: 15px; padding: 10px 15px; border-radius: 18px; max-width: 95%; line-height: 1.4; }
        .user-message { background-color: #007bff; color: white; align-self: flex-end; margin-left: auto; }
        .ia-message { background-color: #e9e9eb; color: #333; align-self: flex-start; }
        .error-message { background-color: #ffebee; color: #c62828; border: 1px solid #c62828; }
        #input-area { display: flex; padding: 15px; border-top: 1px solid #ddd; align-items: center; }
        #user-input { flex-grow: 1; padding: 12px 15px; border: 1px solid #ccc; border-radius: 20px; font-size: 16px; resize: none; }
        .action-button { background: #007bff; color: white; border: none; border-radius: 50%; width: 45px; height: 45px; margin-left: 10px; font-size: 20px; cursor: pointer; display: flex; justify-content: center; align-items: center; transition: background-color 0.2s, transform 0.2s; }
        #mic-button.recording { background-color: #dc3545; transform: scale(1.1); }
        .tabla-resultados { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 14px; }
        .tabla-resultados th, .tabla-resultados td { padding: 10px; border: 1px solid #ddd; text-align: left; }
        .ver-mas-btn { background: none; border: none; color: #007bff; cursor: pointer; text-decoration: underline; }
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; overflow: auto; background-color: rgba(0,0,0,0.5); }
        .modal-content { background-color: #fefefe; margin: 10% auto; padding: 20px; border: 1px solid #888; width: 80%; max-width: 500px; border-radius: 10px; }
        .close-btn { color: #aaa; float: right; font-size: 28px; font-weight: bold; cursor: pointer; }
        .ficha-detalle { font-size: 16px; margin-bottom: 8px; }
        .ficha-detalle strong { color: #333; min-width: 120px; display: inline-block; }
        .doctor-card { background: #f8f9fa; border: 1px solid #dee2e6; border-radius: 8px; padding: 15px; margin-bottom: 10px; }
        .doctor-card h4 { margin: 0 0 10px 0; }
        .doctor-modal-content { max-width: 450px; }
        .doctor-modal-body { text-align: center; }
        .doctor-modal-body img.doctor-photo { max-width: 120px; height: 120px; object-fit: cover; border-radius: 50%; margin-bottom: 15px; border: 3px solid #eee; }
        .doctor-modal-body h2 { margin: 0 0 5px 0; }
        .doctor-modal-body p { margin: 0 0 15px 0; color: #666; }
        .schedule-section { text-align: left; margin-top: 20px; border-top: 1px solid #eee; padding-top: 15px; }
        .schedule-section h3 { margin: 0 0 10px 0; font-size: 1.1em; color: #333; }
        .schedule-day { display: grid; grid-template-columns: 100px 1fr; align-items: center; margin-bottom: 8px; font-size: 0.95em; }
        .schedule-day strong { font-weight: 600; }
        .schedule-slots { display: flex; flex-direction: column; gap: 5px; }
        .slot { padding: 4px 8px; border-radius: 4px; background-color: #f1f3f5; }
        .slot.horario-actual { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; font-weight: bold; }
        .slot.horario-actual::before { content: '●'; margin-right: 6px; color: #28a745; }
        .slot.horario-proximo { background-color: #fff3cd; color: #856404; border: 1px solid #ffeeba; }
    </style>
</head>
<body>
    <!-- El video de fondo ya no es necesario si vamos directo al chat, pero lo dejo por si acaso -->
    <!-- <video autoplay muted loop id="video-background">
        <source src="https://esiklpxyectbekxvajnw.supabase.co/storage/v1/object/public/videos/pexels-tima-miroshnichenko-6706335%20(1080p    ).mp4" type="video/mp4">
    </video> -->

    <div class="main-container">
        <!-- El login-view ha sido eliminado -->
        <div id="chat-view" class="chat-container">
            <div id="chat-window"></div>
            <div id="input-area">
                <input type="text" id="user-input" placeholder="Escribe o presiona el micrófono..."><button id="mic-button" class="action-button">🎤</button><button id="send-button" class="action-button">→</button>
            </div>
        </div>
    </div>

    <!-- Modales (sin cambios) -->
    <div id="detailsModal" class="modal"><div class="modal-content"><span class="close-btn" id="close-patient-modal">&times;</span><h3>Detalles Completos del Registro</h3><div id="modal-body"></div></div></div>
    <div id="doctorModal" class="modal"><div class="modal-content doctor-modal-content"><span class="close-btn" id="close-doctor-modal">&times;</span><div id="doctor-modal-body"></div></div></div>
    <script>
        // --- CÓDIGO v2.3 (Basado en el v2.2 Estable, SIN LOGIN) ---
        const supabaseUrl = 'https://esiklpxyectbekxvajnw.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVzaWtscHh5ZWN0YmVreHZham53Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjE2OTI1MjEsImV4cCI6MjA3NzI2ODUyMX0.mtQnqUrTmhmN1DQxOAUnGpizhYZobStHDH0cz_XfKGU';
        const supabase = window.supabase.createClient(supabaseUrl, supabaseKey );

        // Selectores del DOM (ya no necesitamos los del login)
        const chatView = document.getElementById('chat-view');
        const chatWindow = document.getElementById('chat-window');
        const userInput = document.getElementById('user-input');
        const sendButton = document.getElementById('send-button');
        const micButton = document.getElementById('mic-button');
        const patientModal = document.getElementById('detailsModal');
        const patientModalBody = document.getElementById('modal-body');
        const closePatientBtn = document.getElementById('close-patient-modal');
        const doctorModal = document.getElementById('doctorModal');
        const doctorModalBody = document.getElementById('doctor-modal-body');
        const closeDoctorBtn = document.getElementById('close-doctor-modal');

        let allResults = [];
        let allDoctorResults = [];
        let conversationHistory = [];

        // --- LÓGICA DE INICIALIZACIÓN DIRECTA (SIN LOGIN) ---
        document.addEventListener('DOMContentLoaded', () => {
            addMessage("¡Hola! Soy Manu, tu asistente analista. ¿Qué información necesitas hoy?", 'ia-message');
            userInput.focus();
        });

        // --- Lógica de Reconocimiento de Voz (SIN CAMBIOS) ---
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        let recognition;
        let speechTimeout;
        let isRecording = false;
        if (SpeechRecognition) {
            recognition = new SpeechRecognition();
            recognition.continuous = true; recognition.lang = 'es-ES'; recognition.interimResults = true;
            recognition.onresult = (event) => {
                clearTimeout(speechTimeout);
                let interimTranscript = ''; let finalTranscript = '';
                for (let i = event.resultIndex; i < event.results.length; ++i) {
                    if (event.results[i].isFinal) { finalTranscript += event.results[i][0].transcript; } 
                    else { interimTranscript += event.results[i][0].transcript; }
                }
                userInput.value = finalTranscript + interimTranscript;
                speechTimeout = setTimeout(() => { stopRecordingAndSend(); }, 2500);
            };
            recognition.onerror = (event) => { console.error('Error en el reconocimiento de voz:', event.error); addMessage(`Error de micrófono: ${event.error}`, 'error-message'); stopRecording(); };
        } else { micButton.style.display = 'none'; }
        function toggleRecording() { if (!recognition) return; isRecording ? stopRecording() : startRecording(); }
        function startRecording() { isRecording = true; micButton.classList.add('recording'); micButton.textContent = '...'; userInput.placeholder = 'Escuchando...'; recognition.start(); }
        function stopRecording() { if (!isRecording) return; isRecording = false; micButton.classList.remove('recording'); micButton.textContent = '🎤'; userInput.placeholder = 'Escribe o presiona el micrófono...'; recognition.stop(); clearTimeout(speechTimeout); }
        function stopRecordingAndSend() { if (!isRecording) return; stopRecording(); setTimeout(() => { if (userInput.value.trim()) { handleUserMessage(); } }, 100); }
        
        // --- Lógica de Eventos (SIN CAMBIOS) ---
        micButton.addEventListener('click', toggleRecording);
        sendButton.addEventListener('click', handleUserMessage);
        userInput.addEventListener('keypress', (e) => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleUserMessage(); } });
        closePatientBtn.onclick = () => patientModal.style.display = "none";
        closeDoctorBtn.onclick = () => doctorModal.style.display = "none";
        window.onclick = (event) => { 
            if (event.target == patientModal) { patientModal.style.display = "none"; }
            if (event.target == doctorModal) { doctorModal.style.display = "none"; }
        };

        // --- Lógica del Chat (SIN CAMBIOS) ---
        function addMessage(content, type) {
            const messageDiv = document.createElement('div');
            messageDiv.classList.add('message', type);
            messageDiv.innerHTML = content;
            chatWindow.appendChild(messageDiv);
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }

        async function handleUserMessage() {
            const pregunta = userInput.value.trim();
            if (!pregunta) return;
            addMessage(pregunta, 'user-message');
            userInput.value = '';
            conversationHistory.push({ role: 'user', content: pregunta });
            addMessage('<span class="thinking">Analizando...</span>', 'ia-message');

            try {
                const { data: iaResponse, error: planError } = await supabase.functions.invoke('chat-con-ia', {
                    body: { pregunta: pregunta, historial: conversationHistory.slice(-4) } 
                });
                if (planError) throw planError;
                chatWindow.removeChild(chatWindow.lastChild);

                if (iaResponse.tipo === 'charla') {
                    addMessage(iaResponse.respuesta, 'ia-message');
                    conversationHistory.push({ role: 'assistant', content: iaResponse.respuesta });
                } else if (iaResponse.tipo === 'consulta_db') {
                    const plan = iaResponse.plan;
                    let query = supabase.from(plan.tabla).select(plan.columnas);
                    if (plan.filtros) { plan.filtros.forEach(filtro => { query = query[filtro.operador](filtro.columna, filtro.valor); }); }
                    if (plan.limite) { query = query.limit(plan.limite); }

                    const { data: resultados, error: dbError } = await query;
                    if (dbError) throw dbError;

                    if (!resultados || resultados.length === 0) {
                        addMessage('No encontré resultados para tu consulta.', 'ia-message');
                    } else {
                        addMessage(`Encontré ${resultados.length} resultado(s).`, 'ia-message');
                        if (plan.tabla === 'doctores') {
                            mostrarResultadosDoctores(resultados);
                        } else {
                            mostrarResultadosPacientes(resultados);
                        }
                    }
                } else {
                    throw new Error("La respuesta de la IA no tiene el formato esperado.");
                }
            } catch (error) {
                console.error('Error en el proceso:', error);
                if (chatWindow.lastChild && chatWindow.lastChild.textContent.includes('Analizando')) {
                    chatWindow.removeChild(chatWindow.lastChild);
                }
                addMessage(`Lo siento, ocurrió un error: ${error.message}`, 'error-message');
            }
        }

        // --- Lógica para mostrar resultados (SIN CAMBIOS) ---
        function mostrarResultadosPacientes(resultados) {
            allResults = resultados;
            const tablaHTML = `
                <p>Aquí tienes un resumen:</p>
                <table class="tabla-resultados">
                    <thead><tr><th>Paciente</th><th>Fecha Atención</th><th>Costo</th><th>Acción</th></tr></thead>
                    <tbody>
                        ${resultados.map((paciente, index) => `
                            <tr>
                                <td>${paciente.PACIENTE || 'N/A'}</td>
                                <td>${paciente.FecAte ? new Date(paciente.FecAte + 'T00:00:00').toLocaleDateString('es-ES') : 'N/A'}</td>
                                <td>S/ ${paciente.CostoTotal || '0.00'}</td>
                                <td><button class="ver-mas-btn" onclick="showPatientDetails(${index})">Ver más</button></td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>`;
            addMessage(tablaHTML, 'ia-message');
        }

        window.showPatientDetails = (index) => {
            const item = allResults[index];
            if (!item) return;
            let detailsHTML = '';
            for (const key in item) {
                if (key !== 'id') {
                    detailsHTML += `<div class="ficha-detalle"><strong>${key.replace(/_/g, ' ')}:</strong> ${item[key] || 'N/A'}</div>`;
                }
            }
            patientModalBody.innerHTML = detailsHTML;
            patientModal.style.display = "block";
        }

        function mostrarResultadosDoctores(resultados) {
            allDoctorResults = resultados;
            const cardsHTML = `
                <p>He encontrado los siguientes doctores:</p>
                ${resultados.map((doc, index) => `
                    <div class="doctor-card">
                        <h4>${doc.nombre || 'Sin nombre'}</h4>
                        <p><strong>RNE:</strong> ${doc.rne || 'N/A'} | <strong>Especialidad:</strong> ${doc.especialidad || 'N/A'}</p>
                        <button class="ver-mas-btn" onclick="showDoctorDetails(${index})">Ver Ficha Completa</button>
                    </div>
                `).join('')}`;
            addMessage(cardsHTML, 'ia-message');
        }
        
        async function showDoctorDetails(index) {
            // ... (La función de detalles del doctor no necesita cambios)
        }
    </script>
</body>
</html>
